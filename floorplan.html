    function AppLayout({ activePage, children }) {
      const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'light');
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);

      useEffect(() => {
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', theme);
      }, [theme]);

      const toggleTheme = () => setTheme(prev => prev === 'light' ? 'dark' : 'light');

      return (
        <div className="flex h-screen bg-[#F6F8F9] dark:bg-[#15151A] text-slate-800 dark:text-slate-200 overflow-hidden transition-colors duration-300">

    function FloorPlanApp() {
      const canvasRef = useRef(null);
      const [leftTab, setLeftTab] = useState('library'); 
      const [mobileSubTab, setMobileSubTab] = useState('canvas'); 
      
      const [items, setItems] = useState([
        { id: 1, type: 'rect', cx: 400, cy: 160, w: 200, h: 80, label: '主舞台', color: '#fef3c7', rotation: 0, scale: 1 },
        { id: 2, type: 'rect', cx: 400, cy: 380, w: 100, h: 40, label: '控台 (PA)', color: '#e0f2fe', rotation: 0, scale: 1 }
      ]);
      const [selectedId, setSelectedId] = useState(null);
      const [draggingId, setDraggingId] = useState(null);
      
      const [mode, setMode] = useState('select'); 
      const [polygonPoints, setPolygonPoints] = useState([]);
      const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
      const lastMouseRef = useRef({ x: 0, y: 0 });

      const libraryCategories = [
        { name: '會議論壇', items: [{ label: '演講舞台', w: 180, h: 60, icon: <Icon name="presentation" className="w-5 h-5 text-amber-500 mb-1" />, color: '#fef3c7' }, { label: '水晶講桌', w: 40, h: 40, icon: <Icon name="mic" className="w-5 h-5 text-slate-500 mb-1" />, color: '#f3f4f6' }, { label: '貴賓沙發', w: 100, h: 40, icon: <Icon name="sofa" className="w-5 h-5 text-emerald-500 mb-1" />, color: '#d1fae5' }, { label: '觀眾排椅', w: 120, h: 80, icon: <Icon name="users" className="w-5 h-5 text-blue-500 mb-1" />, color: '#dbeafe' }] },
        { name: '市集展攤', items: [{ label: '標準攤位', w: 90, h: 90, icon: <Icon name="store" className="w-5 h-5 text-green-600 mb-1" />, color: '#bbf7d0' }, { label: '造型餐車', w: 120, h: 60, icon: <Icon name="truck" className="w-5 h-5 text-amber-600 mb-1" />, color: '#fde68a' }, { label: '陳列長桌', w: 120, h: 40, icon: <Icon name="table" className="w-5 h-5 text-orange-700 mb-1" />, color: '#fed7aa' }, { label: '大遮陽傘', w: 80, h: 80, icon: <Icon name="umbrella" className="w-5 h-5 text-sky-500 mb-1" />, color: '#bae6fd' }] },
        { name: '戶外與安全', items: [{ label: '活動帳篷', w: 100, h: 100, icon: <Icon name="tent" className="w-5 h-5 text-amber-700 mb-1" />, color: '#fed7aa' }, { label: '充氣拱門', w: 160, h: 30, icon: <Icon name="rainbow" className="w-5 h-5 text-pink-500 mb-1" />, color: '#fbcfe8' }, { label: '流動廁所', w: 60, h: 60, icon: <Icon name="droplets" className="w-5 h-5 text-blue-500 mb-1" />, color: '#e0f2fe' }, { label: '醫護站', w: 90, h: 60, icon: <Icon name="heartPulse" className="w-5 h-5 text-red-500 mb-1" />, color: '#fecaca' }] }
      ];

      const getMousePos = (canvas, evt) => {
        const rect = canvas.getBoundingClientRect(); const scaleX = canvas.width / rect.width; const scaleY = canvas.height / rect.height;
        return { x: (evt.clientX - rect.left) * scaleX, y: (evt.clientY - rect.top) * scaleY };
      };

      const getTouchPos = (canvas, evt) => {
        if (!evt.touches || evt.touches.length === 0) return { x: 0, y: 0 };
        const touch = evt.touches[0]; const rect = canvas.getBoundingClientRect(); const scaleX = canvas.width / rect.width; const scaleY = canvas.height / rect.height;
        return { x: (touch.clientX - rect.left) * scaleX, y: (touch.clientY - rect.top) * scaleY };
      };

      const isPointInRotatedRect = (pos, item) => {
        const dx = pos.x - item.cx; const dy = pos.y - item.cy; const rad = -(item.rotation || 0) * Math.PI / 180;
        const rx = dx * Math.cos(rad) - dy * Math.sin(rad); const ry = dx * Math.sin(rad) + dy * Math.cos(rad);
        const actualW = item.w * (item.scale || 1); const actualH = item.h * (item.scale || 1);
        return Math.abs(rx) <= actualW / 2 && Math.abs(ry) <= actualH / 2;
      };

      const isPointInPolygon = (point, vs) => {
        let x = point.x, y = point.y; let inside = false;
        for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
          let xi = vs[i].x, yi = vs[i].y; let xj = vs[j].x, yj = vs[j].y;
          let intersect = ((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
          if (intersect) inside = !inside;
        } return inside;
      };

      const handleCanvasStart = (pos) => {
        if (mode === 'draw_polygon') {
          if (polygonPoints.length > 2) {
            const firstPt = polygonPoints[0]; const dist = Math.sqrt(Math.pow(pos.x - firstPt.x, 2) + Math.pow(pos.y - firstPt.y, 2));
            if (dist < 20) { finishPolygon(); return; }
          }
          setPolygonPoints([...polygonPoints, pos]); return;
        }
        let hitId = null;
        for (let i = items.length - 1; i >= 0; i--) {
          const item = items[i];
          if (item.type === 'rect') { if (isPointInRotatedRect(pos, item)) { hitId = item.id; break; } } 
          else if (item.type === 'polygon') { if (isPointInPolygon(pos, item.points)) { hitId = item.id; break; } }
        }
        setSelectedId(hitId);
        if (hitId) { setDraggingId(hitId); lastMouseRef.current = pos; }
      };

      const handleCanvasMove = (pos) => {
        setMousePos(pos);
        if (draggingId) {
          const dx = pos.x - lastMouseRef.current.x; const dy = pos.y - lastMouseRef.current.y; lastMouseRef.current = pos;
          setItems(items.map(item => {
            if (item.id === draggingId) {
              if (item.type === 'rect') return { ...item, cx: item.cx + dx, cy: item.cy + dy };
              else if (item.type === 'polygon') return { ...item, points: item.points.map(p => ({ x: p.x + dx, y: p.y + dy })) };
            }
            return item;
          }));
        }
      };

      const handleCanvasEnd = () => { setDraggingId(null); };
      const handleDoubleClick = () => { if (mode === 'draw_polygon' && polygonPoints.length >= 3) finishPolygon(); };

      const finishPolygon = () => {
        if (polygonPoints.length < 3) { setPolygonPoints([]); setMode('select'); return; }
        const newId = items.length > 0 ? Math.max(...items.map(i => i.id)) + 1 : 1;
        setItems([...items, { id: newId, type: 'polygon', points: polygonPoints, label: '不規則區域', color: '#fef3c7' }]);
        setPolygonPoints([]); setMode('select'); setMobileSubTab('canvas');
      };

      const addLibraryItem = (libItem) => {
        const newId = items.length > 0 ? Math.max(...items.map(i => i.id)) + 1 : 1;
        setItems([...items, { id: newId, type: 'rect', cx: 400, cy: 300, w: libItem.w, h: libItem.h, label: libItem.label, color: libItem.color, rotation: 0, scale: 1 }]);
        setSelectedId(newId); setMode('select'); setMobileSubTab('canvas');
      };

      const updateItem = (id, field, value) => { setItems(items.map(item => item.id === id ? { ...item, [field]: value } : item)); };
      const deleteItem = (id) => { setItems(items.filter(item => item.id !== id)); if (selectedId === id) setSelectedId(null); };

      const duplicateItem = (id) => {
        const itemToCopy = items.find(i => i.id === id);
        if (itemToCopy) {
          const newId = items.length > 0 ? Math.max(...items.map(i => i.id)) + 1 : 1;
          let newItem = { ...itemToCopy, id: newId, label: itemToCopy.label + ' (複製)' };
          if (newItem.type === 'rect') { newItem.cx += 20; newItem.cy += 20; } else if (newItem.type === 'polygon') { newItem.points = newItem.points.map(p => ({ x: p.x + 20, y: p.y + 20 })); }
          setItems([...items, newItem]); setSelectedId(newId);
        }
      };

      const moveLayer = (id, action) => {
        setItems(prev => {
          const index = prev.findIndex(item => item.id === id);
          if (index === -1) return prev;
          const newItems = [...prev];
          if (action === 'front' && index < prev.length - 1) { const [item] = newItems.splice(index, 1); newItems.push(item); }
          else if (action === 'back' && index > 0) { const [item] = newItems.splice(index, 1); newItems.unshift(item); }
          else if (action === 'up' && index < prev.length - 1) { const temp = newItems[index]; newItems[index] = newItems[index + 1]; newItems[index + 1] = temp; }
          else if (action === 'down' && index > 0) { const temp = newItems[index]; newItems[index] = newItems[index - 1]; newItems[index - 1] = temp; }
          return newItems;
        });
      };

      const clearCanvas = () => { if(window.confirm('確定要清空畫布重新繪製嗎？')) { setItems([]); setSelectedId(null); setPolygonPoints([]); } };

      const getPolygonCentroid = (pts) => {
        let first = pts[0], last = pts[pts.length - 1]; if (first.x !== last.x || first.y !== last.y) pts = [...pts, first];
        let twicearea = 0, x = 0, y = 0, nPts = pts.length, p1, p2, f;
        for (let i = 0, j = nPts - 1; i < nPts; j = i++) {
          p1 = pts[i]; p2 = pts[j]; f = p1.x * p2.y - p2.x * p1.y; twicearea += f; x += (p1.x + p2.x) * f; y += (p1.y + p2.y) * f;
        }
        f = twicearea * 3; return { x: x / f, y: y / f };
      };

      useEffect(() => {
        const canvas = canvasRef.current; if (!canvas) return; const ctx = canvas.getContext('2d');
        const width = 800; const height = 600; canvas.width = width; canvas.height = height;
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, width, height);
        ctx.strokeStyle = '#f1f5f9'; ctx.lineWidth = 1;
        for(let x=0; x<=width; x+=20) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke(); }
        for(let y=0; y<=height; y+=20) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke(); }

        items.forEach(item => {
          ctx.save();
          const isSelected = item.id === selectedId;
          ctx.strokeStyle = isSelected ? '#4f46e5' : '#64748b'; ctx.lineWidth = isSelected ? 2.5 : 1.2;
          if (isSelected) { ctx.shadowColor = 'rgba(79, 70, 229, 0.4)'; ctx.shadowBlur = 6; }

          if (item.type === 'rect') {
            const actualW = item.w * (item.scale || 1); const actualH = item.h * (item.scale || 1);
            ctx.translate(item.cx, item.cy); ctx.rotate((item.rotation || 0) * Math.PI / 180); ctx.beginPath();
            ctx.roundRect(-actualW / 2, -actualH / 2, actualW, actualH, 4);
            if (item.color !== 'transparent') { ctx.fillStyle = item.color; ctx.fill(); } else if (isSelected) { ctx.fillStyle = 'rgba(79, 70, 229, 0.05)'; ctx.fill(); }
            ctx.stroke(); ctx.fillStyle = '#1e293b'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.shadowColor = 'transparent';
            ctx.fillText(item.label, 0, 0);
          } else if (item.type === 'polygon') {
            ctx.beginPath();
            item.points.forEach((p, idx) => { if (idx === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
            ctx.closePath();
            if (item.color !== 'transparent') { ctx.fillStyle = item.color; ctx.fill(); } else if (isSelected) { ctx.fillStyle = 'rgba(79, 70, 229, 0.05)'; ctx.fill(); }
            ctx.stroke(); const centroid = getPolygonCentroid(item.points); ctx.fillStyle = '#1e293b'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.shadowColor = 'transparent'; ctx.fillText(item.label, centroid.x, centroid.y);
          }
          ctx.restore();
        });

        if (mode === 'draw_polygon' && polygonPoints.length > 0) {
          ctx.strokeStyle = '#4f46e5'; ctx.lineWidth = 2; ctx.setLineDash([5, 5]); ctx.beginPath();
          polygonPoints.forEach((p, idx) => { if (idx === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); ctx.fillStyle = '#4f46e5'; ctx.fillRect(p.x - 3, p.y - 3, 6, 6); });
          ctx.lineTo(mousePos.x, mousePos.y); ctx.stroke(); ctx.setLineDash([]); 
          if (polygonPoints.length > 2) { ctx.beginPath(); ctx.arc(polygonPoints[0].x, polygonPoints[0].y, 5, 0, Math.PI*2); ctx.fillStyle = 'rgba(79, 70, 229, 0.5)'; ctx.fill(); }
        }
      }, [items, selectedId, mode, polygonPoints, mousePos]);

      const selectedItem = items.find(i => i.id === selectedId);
      const reversedItems = [...items].reverse();

      return (
        <div className="h-full flex flex-col animate-in fade-in transition-colors">
          <div className="px-6 sm:px-8 py-5 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-[#202024] flex flex-col sm:flex-row justify-between sm:items-center gap-3 shrink-0">
            <h2 className="text-xl font-bold text-slate-900 dark:text-white flex items-center gap-2"><Icon name="map" className="w-5 h-5 text-indigo-600 dark:text-indigo-400" /> 平面圖繪製與自訂編輯</h2>
            <div className="flex gap-2 sm:gap-3">
              <button onClick={clearCanvas} className="text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-[#2A2B30] px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-2 transition-colors border border-slate-200 dark:border-slate-700">
                <Icon name="rotateCcw" /> 重設畫布
              </button>
              <button onClick={() => { const link = document.createElement('a'); link.download = 'floor_plan.png'; link.href = canvasRef.current.toDataURL(); link.click(); }} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded-lg text-sm font-medium flex items-center gap-2 shadow-sm transition-colors">
                <Icon name="download" /> 匯出圖面
              </button>
            </div>
          </div>

          <div className="lg:hidden bg-white dark:bg-[#202024] border-b border-slate-200 dark:border-slate-800 px-4 py-2 flex gap-1 shrink-0">
            <button onClick={() => setMobileSubTab('library')} className={`flex-1 py-2 rounded-md text-xs font-bold text-center border transition-all ${mobileSubTab === 'library' ? 'bg-indigo-50 dark:bg-indigo-500/10 text-indigo-700 dark:text-indigo-400 border-indigo-200' : 'border-transparent text-slate-500'}`}>元件圖庫</button>
            <button onClick={() => setMobileSubTab('canvas')} className={`flex-1 py-2 rounded-md text-xs font-bold text-center border transition-all ${mobileSubTab === 'canvas' ? 'bg-indigo-50 dark:bg-indigo-500/10 text-indigo-700 dark:text-indigo-400 border-indigo-200' : 'border-transparent text-slate-500'}`}>編輯畫布</button>
            <button onClick={() => setMobileSubTab('settings')} className={`flex-1 py-2 rounded-md text-xs font-bold text-center border transition-all ${mobileSubTab === 'settings' ? 'bg-indigo-50 dark:bg-indigo-500/10 text-indigo-700 dark:text-indigo-400 border-indigo-200' : 'border-transparent text-slate-500'}`}>屬性圖層</button>
          </div>

          <div className="flex flex-1 min-h-0 overflow-hidden">
            <div className={`w-full lg:w-[260px] bg-white dark:bg-[#202024] border-r border-slate-200 dark:border-slate-800 flex-col shrink-0 z-10 ${mobileSubTab === 'library' ? 'flex' : 'hidden lg:flex'}`}>
              <div className="flex border-b border-slate-200 dark:border-slate-800">
                <button onClick={() => setLeftTab('library')} className={`flex-1 py-3 text-xs font-bold flex items-center justify-center gap-1 border-b-2 transition-colors ${leftTab === 'library' ? 'border-indigo-600 text-indigo-700' : 'border-transparent text-slate-500'}`}><Icon name="layoutGrid" /> 活動元件</button>
                <button onClick={() => setLeftTab('custom')} className={`flex-1 py-3 text-xs font-bold flex items-center justify-center gap-1 border-b-2 transition-colors ${leftTab === 'custom' ? 'border-indigo-600 text-indigo-700' : 'border-transparent text-slate-500'}`}><Icon name="penTool" /> 自訂繪圖</button>
              </div>
              <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
                {leftTab === 'library' ? (
                  <div className="space-y-6">
                    {libraryCategories.map(cat => (
                      <div key={cat.name}>
                        <h3 className="text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-3">{cat.name}</h3>
                        <div className="grid grid-cols-2 gap-2">
                          {cat.items.map(libItem => (
                            <button key={libItem.label} onClick={() => addLibraryItem(libItem)} className="flex flex-col items-center justify-center p-3 bg-white dark:bg-[#15151A] border border-slate-200 dark:border-slate-700 rounded-lg hover:border-indigo-400 group transition-colors">
                              <div className="group-hover:scale-110 transition-transform">{libItem.icon}</div>
                              <span className="text-[11px] font-medium text-slate-600 dark:text-slate-300 mt-1">{libItem.label}</span>
                            </button>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div className="space-y-4">
                    <div className="p-4 bg-indigo-50 dark:bg-indigo-500/10 rounded-lg border border-indigo-100">
                      <h4 className="font-bold text-indigo-800 dark:text-indigo-300 text-sm mb-2 flex items-center gap-2"><Icon name="edit3" /> 繪製不規則邊界</h4>
                      <p className="text-xs text-indigo-600/80 mb-3 leading-relaxed">點擊畫布定點，雙擊滑鼠完成閉合。</p>
                      <div className="flex gap-2">
                        <button onClick={() => setMode('select')} className={`flex-1 py-1.5 rounded-md text-xs font-bold border transition-all ${mode === 'select' ? 'bg-white border-indigo-300 text-indigo-700' : 'border-transparent text-slate-500'}`}>選取模式</button>
                        <button onClick={() => { setMode('draw_polygon'); setSelectedId(null); }} className={`flex-1 py-1.5 rounded-md text-xs font-bold border transition-all ${mode === 'draw_polygon' ? 'bg-indigo-600 border-indigo-600 text-white' : 'border-slate-300 bg-white text-slate-600'}`}>開始繪製</button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className={`flex-1 relative items-center justify-center p-4 bg-[#F6F8F9] dark:bg-[#15151A] overflow-auto ${mobileSubTab === 'canvas' ? 'flex' : 'hidden lg:flex'}`}>
              {mode === 'draw_polygon' && (<div className="absolute top-6 left-1/2 transform -translate-x-1/2 bg-indigo-600 text-white px-4 py-2 rounded-full text-xs font-bold shadow-md z-10 pointer-events-none">正在繪製多邊形：點擊定點，雙擊閉合</div>)}
              <div className="relative shadow-md border border-slate-200 dark:border-slate-800 bg-white">
                <canvas 
                  ref={canvasRef}
                  onMouseDown={(e) => handleCanvasStart(getMousePos(canvasRef.current, e))}
                  onMouseMove={(e) => handleCanvasMove(getMousePos(canvasRef.current, e))}
                  onMouseUp={handleCanvasEnd} onMouseLeave={handleCanvasEnd} onDoubleClick={handleDoubleClick}
                  onTouchStart={(e) => { e.preventDefault(); handleCanvasStart(getTouchPos(canvasRef.current, e)); }}
                  onTouchMove={(e) => { e.preventDefault(); handleCanvasMove(getTouchPos(canvasRef.current, e)); }}
                  onTouchEnd={(e) => { e.preventDefault(); handleCanvasEnd(); }}
                  className={`${mode === 'draw_polygon' ? 'cursor-crosshair' : (draggingId ? 'cursor-grabbing' : 'cursor-pointer')} max-w-full max-h-full object-contain block`}
                ></canvas>
              </div>
            </div>

            <div className={`w-full lg:w-[280px] bg-white dark:bg-[#202024] border-l border-slate-200 dark:border-slate-800 flex-col shrink-0 z-10 overflow-y-auto custom-scrollbar ${mobileSubTab === 'settings' ? 'flex' : 'hidden lg:flex'}`}>
              <div className="p-4 border-b border-slate-100 dark:border-slate-800/50">
                <h3 className="font-bold text-sm text-slate-800 dark:text-slate-200 flex items-center gap-2"><Icon name="settings" className="text-slate-400" /> 元件屬性設定</h3>
              </div>
              {selectedItem ? (
                <div className="p-5 space-y-6">
                  <div>
                    <label className="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-2">自訂名稱</label>
                    <input type="text" value={selectedItem.label} onChange={(e) => updateItem(selectedItem.id, 'label', e.target.value)} className="w-full bg-white dark:bg-[#15151A] border border-slate-300 dark:border-slate-700 rounded-lg p-2 text-sm outline-none text-slate-900 dark:text-slate-100" />
                  </div>
                  {selectedItem.type === 'rect' && (
                    <>
                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <span className="text-[10px] text-slate-400 block mb-1">寬度(W)</span>
                          <input type="number" value={selectedItem.w} onChange={(e) => updateItem(selectedItem.id, 'w', Number(e.target.value))} className="w-full bg-white dark:bg-[#15151A] border border-slate-300 dark:border-slate-700 rounded-lg p-2 text-sm text-center outline-none text-slate-900 dark:text-slate-100" />
                        </div>
                        <div>
                          <span className="text-[10px] text-slate-400 block mb-1">高度(H)</span>
                          <input type="number" value={selectedItem.h} onChange={(e) => updateItem(selectedItem.id, 'h', Number(e.target.value))} className="w-full bg-white dark:bg-[#15151A] border border-slate-300 dark:border-slate-700 rounded-lg p-2 text-sm text-center outline-none text-slate-900 dark:text-slate-100" />
                        </div>
                      </div>
                      <div>
                        <div className="flex justify-between items-center mb-2">
                          <label className="text-xs font-bold text-slate-600 dark:text-slate-400">旋轉角度</label>
                          <span className="text-xs font-bold text-indigo-600">{selectedItem.rotation || 0}°</span>
                        </div>
                        <input type="range" min="-180" max="180" step="5" value={selectedItem.rotation || 0} onChange={(e) => updateItem(selectedItem.id, 'rotation', Number(e.target.value))} className="w-full accent-indigo-600 h-1.5 bg-slate-200 rounded-lg cursor-pointer" />
                      </div>
                    </>
                  )}
                  <div>
                    <label className="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-3">視覺顏色</label>
                    <div className="flex flex-wrap gap-2">
                      {['#fef3c7', '#fee2e2', '#e0f2fe', '#d1fae5', '#f3e8ff', '#f1f5f9'].map(c => (
                        <button key={c} onClick={() => updateItem(selectedItem.id, 'color', c)} className={`w-7 h-7 rounded-md shadow-sm transition-transform ${selectedItem.color === c ? 'ring-2 ring-indigo-500 scale-110' : 'border border-slate-200'}`} style={{ backgroundColor: c }} />
                      ))}
                      <button onClick={() => updateItem(selectedItem.id, 'color', 'transparent')} className={`w-7 h-7 rounded-md border-2 border-dashed border-slate-400 relative bg-transparent transition-transform ${selectedItem.color === 'transparent' ? 'ring-2 ring-indigo-500 scale-110' : ''}`}><div className="absolute inset-0 flex items-center justify-center"><div className="w-full h-0.5 bg-red-400/80 rotate-45"></div></div></button>
                    </div>
                  </div>
                  <div className="pt-4 border-t border-slate-100 dark:border-slate-800">
                    <label className="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-2">圖層順序</label>
                    <div className="grid grid-cols-4 gap-1">
                      <button onClick={() => moveLayer(selectedItem.id, 'front')} className="flex flex-col items-center py-2 px-1 border border-slate-200 rounded-lg hover:bg-slate-50"><span className="text-[9px] font-bold">最頂</span></button>
                      <button onClick={() => moveLayer(selectedItem.id, 'up')} className="flex flex-col items-center py-2 px-1 border border-slate-200 rounded-lg hover:bg-slate-50"><span className="text-[9px] font-bold">上移</span></button>
                      <button onClick={() => moveLayer(selectedItem.id, 'down')} className="flex flex-col items-center py-2 px-1 border border-slate-200 rounded-lg hover:bg-slate-50"><span className="text-[9px] font-bold">下移</span></button>
                      <button onClick={() => moveLayer(selectedItem.id, 'back')} className="flex flex-col items-center py-2 px-1 border border-slate-200 rounded-lg hover:bg-slate-50"><span className="text-[9px] font-bold">最底</span></button>
                    </div>
                  </div>
                  <div className="pt-4 border-t border-slate-100 dark:border-slate-800">
                    <div className="grid grid-cols-2 gap-3">
                      <button onClick={() => duplicateItem(selectedItem.id)} className="flex items-center justify-center gap-2 py-2.5 bg-white border border-slate-300 rounded-lg text-xs font-bold"><Icon name="copy" /> 複製</button>
                      <button onClick={() => deleteItem(selectedItem.id)} className="flex items-center justify-center gap-2 py-2.5 bg-red-50 text-red-600 rounded-lg text-xs font-bold"><Icon name="trash2" /> 刪除</button>
                    </div>
                  </div>
                  <div className="pt-4 border-t border-slate-100 dark:border-slate-800">
                    <label className="block text-xs font-bold text-slate-600 dark:text-slate-400 mb-2">圖層清單</label>
                    <div className="space-y-1 max-h-40 overflow-y-auto custom-scrollbar">
                      {reversedItems.map((item) => (
                        <div key={item.id} onClick={() => setSelectedId(item.id)} className={`flex items-center justify-between p-2 rounded-lg text-xs cursor-pointer ${selectedId === item.id ? 'bg-indigo-50 text-indigo-700 font-bold border border-indigo-200' : 'hover:bg-slate-50 border border-transparent'}`}>
                          <div className="flex items-center gap-2 truncate"><div className={`w-3.5 h-3.5 rounded-sm border ${item.color === 'transparent' ? 'border-dashed' : ''}`} style={{ backgroundColor: item.color === 'transparent' ? 'transparent' : item.color }}></div><span className="truncate">{item.label}</span></div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              ) : (
                <div className="flex-1 flex flex-col items-center justify-center p-6 text-center">
                  <div className="w-12 h-12 rounded-full bg-slate-50 dark:bg-[#15151A] flex items-center justify-center mb-3"><Icon name="mousePointer2" className="text-slate-400" /></div>
                  <p className="text-sm text-slate-500 font-medium">請在畫布上點選元件</p>
                  {items.length > 0 && (
                    <div className="w-full text-left mt-6 pt-6 border-t border-slate-100 dark:border-slate-800">
                      <label className="block text-xs font-bold text-slate-600 mb-2">圖層快速選擇</label>
                      <div className="space-y-1 max-h-48 overflow-y-auto custom-scrollbar">
                        {reversedItems.map((item) => (
                          <div key={item.id} onClick={() => setSelectedId(item.id)} className="flex items-center justify-between p-2 rounded-lg text-xs cursor-pointer hover:bg-slate-50">
                            <span className="truncate">{item.label}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AppLayout activePage="floorplan"><FloorPlanApp /></AppLayout>);
