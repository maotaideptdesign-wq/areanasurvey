<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventScout - 場勘佈置專業小幫手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'Noto Sans TC', 'sans-serif'], } } } }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
  </style>
</head>
<body class="bg-[#F6F8F9] dark:bg-[#15151A] text-slate-800 dark:text-slate-200 overflow-hidden transition-colors duration-300">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function Icon({ name, className = "w-4 h-4" }) {
      const icons = {
        home: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></svg>,
        box: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" /><polyline points="3.27 6.96 12 12.01 20.73 6.96" /><line x1="12" y1="22.08" x2="12" y2="12" /></svg>,
        map: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21" /><line x1="9" y1="3" x2="9" y2="18" /><line x1="15" y1="6" x2="15" y2="21" /></svg>,
        fileText: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7z" /><path d="M14 2v4a2 2 0 0 0 2 2h4" /><path d="M10 9H8" /><path d="M16 13H8" /><path d="M16 17H8" /></svg>,
        book: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" /><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" /></svg>,
        calculator: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="18"></line><path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path></svg>,
        settings: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" /></svg>,
        sun: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" /></svg>,
        moon: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z" /></svg>,
        menu: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="18" x2="21" y2="18" /></svg>,
        x: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>,
        arrowRight: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></svg>,
        checkCircle2: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z" /><path d="m9 12 2 2 4-4" /></svg>,
        sparkles: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3z" /></svg>
      };
      return icons[name] || null;
    }

    function AppLayout({ activePage, children, theme, toggleTheme }) {
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);

      return (
        <div className="flex h-screen bg-[#F6F8F9] dark:bg-[#15151A] text-slate-800 dark:text-slate-200 overflow-hidden transition-colors duration-300">
          <header className="lg:hidden fixed top-0 left-0 right-0 h-14 bg-white dark:bg-[#202024] border-b border-slate-200 dark:border-slate-800 px-4 flex items-center justify-between shrink-0 z-40 transition-colors duration-300">
            <button onClick={() => setIsSidebarOpen(true)} className="p-1.5 rounded-md hover:bg-slate-100 dark:hover:bg-[#2A2B30] text-slate-600 dark:text-slate-400">
              <Icon name="menu" className="w-6 h-6" />
            </button>
            <a href="index.html" className="font-bold text-slate-900 dark:text-white flex items-center gap-2 hover:opacity-80 transition-opacity">
              <div className="w-5 h-5 rounded bg-indigo-600 flex items-center justify-center"><Icon name="settings" className="w-3 h-3 text-white" /></div>
              EventScout
            </a>
            <button onClick={toggleTheme} className="p-1.5 rounded-md hover:bg-slate-100 dark:hover:bg-[#2A2B30] text-slate-600 dark:text-slate-400">
              {theme === 'light' ? <Icon name="moon" className="w-5 h-5" /> : <Icon name="sun" className="w-5 h-5" />}
            </button>
          </header>

          {isSidebarOpen && <div onClick={() => setIsSidebarOpen(false)} className="lg:hidden fixed inset-0 bg-black/50 z-40 transition-opacity duration-300" />}

          <aside className={`fixed lg:relative inset-y-0 left-0 w-64 bg-white dark:bg-[#202024] border-r border-slate-200 dark:border-slate-800 flex flex-col flex-shrink-0 z-50 transition-transform duration-300 print:hidden lg:translate-x-0 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
            <div className="p-6 flex items-center justify-between">
              <a href="index.html" className="text-xl font-bold flex items-center gap-2 text-slate-900 dark:text-white hover:opacity-80 transition-opacity">
                <div className="w-6 h-6 rounded-md bg-indigo-600 flex items-center justify-center"><Icon name="settings" className="w-4 h-4 text-white" /></div>
                EventScout
              </a>
              <button onClick={() => setIsSidebarOpen(false)} className="lg:hidden p-1.5 rounded-md hover:bg-slate-100 dark:hover:bg-[#2A2B30] text-slate-600 dark:text-slate-400">
                <Icon name="x" className="w-5 h-5" />
              </button>
            </div>
            
            <nav className="flex-1 px-3 space-y-1 mt-2 custom-scrollbar overflow-y-auto">
              <NavItem href="index.html" icon={<Icon name="home" />} label="首頁介紹" isActive={activePage === 'home'} />
              <NavItem href="knowledge.html" icon={<Icon name="book" />} label="場勘專業知識庫" isActive={activePage === 'knowledge'} />
              <div className="pt-4 pb-2 px-3 text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">工作區工具</div>
              <NavItem href="calculator.html" icon={<Icon name="calculator" />} label="專業尺寸與空間換算" isActive={activePage === 'calculator'} />
              <NavItem href="truss.html" icon={<Icon name="box" />} label="Truss 架構圖" isActive={activePage === 'truss'} />
              <NavItem href="floorplan.html" icon={<Icon name="map" />} label="平面圖繪製" isActive={activePage === 'floorplan'} />
              <NavItem href="report.html" icon={<Icon name="fileText" />} label="場勘報告匯出" isActive={activePage === 'report'} />
            </nav>
            
            <div className="p-4 border-t border-slate-100 dark:border-slate-800/50">
              <button onClick={toggleTheme} className="w-full flex items-center justify-between px-3 py-2 rounded-lg text-sm text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-[#2A2B30] transition-colors">
                <span className="font-medium flex items-center gap-2">
                  {theme === 'light' ? <Icon name="moon" /> : <Icon name="sun" />}
                  {theme === 'light' ? '切換深色模式' : '切換淺色模式'}
                </span>
              </button>
            </div>
          </aside>

          <main className="flex-1 overflow-y-auto relative pt-14 lg:pt-0 print:pt-0 print:w-full print:absolute print:inset-0 bg-[#F6F8F9] dark:bg-[#15151A] transition-colors duration-300">
            {children}
          </main>
        </div>
      );
    }

    function NavItem({ icon, label, isActive, href }) {
      return (
        <a href={href} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all text-sm ${isActive ? 'bg-indigo-50 dark:bg-indigo-500/10 text-indigo-700 dark:text-indigo-400 font-semibold' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-[#2A2B30] hover:text-slate-900 dark:hover:text-slate-200 font-medium'}`}>
          {icon}<span>{label}</span>
        </a>
      );
    }

    function HomeApp() {
      return (
        <div className="min-h-full pb-12 animate-in fade-in duration-500">
          <div className="px-6 sm:px-10 pt-10 sm:pt-12 pb-8 bg-white dark:bg-[#202024] border-b border-slate-200 dark:border-slate-800 transition-colors">
            <div className="max-w-5xl mx-auto flex flex-col md:flex-row gap-8 items-start md:items-center">
              <div className="flex-1">
                <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 text-xs font-bold mb-6">
                  <Icon name="sparkles" className="w-3.5 h-3.5" />
                  <span>v4.5 Update：全新加入 LED/投影與空間換算工具！</span>
                </div>
                <h1 className="text-3xl md:text-5xl font-extrabold mb-4 text-slate-900 dark:text-white tracking-tight leading-tight">
                  場佈專業小幫手
                </h1>
                <p className="text-base sm:text-lg text-slate-500 dark:text-slate-400 max-w-xl leading-relaxed mb-8">
                  無論是舞台設計、動線規劃、人數預估還是硬體設備紀錄，EventScout 都能幫助您快速計算數據並生成標準化圖面，讓提案品質大幅提升、發包更精確。
                </p>
                <div className="flex flex-col sm:flex-row gap-3 sm:gap-4">
                  <a href="calculator.html" className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-lg font-medium shadow-sm transition-colors flex items-center justify-center gap-2 text-sm">
                    <Icon name="calculator" className="w-4 h-4" />
                    開啟空間與硬體換算
                  </a>
                  <a href="knowledge.html" className="bg-white dark:bg-[#2A2B30] border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-[#323338] px-6 py-3 rounded-lg font-medium shadow-sm transition-colors flex items-center justify-center gap-2 text-sm">
                    <Icon name="book" className="w-4 h-4" />
                    閱讀場勘避坑指南
                  </a>
                </div>
              </div>
              
              {/* 今日場勘小提醒區塊 */}
              <div className="w-full md:w-80 bg-emerald-50 dark:bg-[#1E293B] border border-emerald-100 dark:border-slate-700 rounded-2xl p-6 shrink-0">
                <div className="flex items-center gap-2 text-emerald-600 dark:text-emerald-400 font-bold text-sm mb-3">
                  <Icon name="checkCircle2" />
                  今日提醒
                </div>
                <p className="text-slate-700 dark:text-slate-300 text-sm leading-relaxed mb-4 italic">
                  「提醒：現在天氣超熱，記得防曬，還有要喝水啊！！！喝水！！！」
                </p>
                <div className="text-xs text-slate-500 dark:text-slate-400 font-medium">
                   <a href="knowledge.html" className="underline hover:text-indigo-500">來自經驗者的吶喊。</a>
                </div>
              </div>
            </div>
          </div>

          <div className="max-w-5xl mx-auto px-6 sm:px-10 mt-10 sm:mt-12">
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
              <FeatureCard 
                icon={<Icon name="calculator" className="w-6 h-6 text-emerald-600 dark:text-emerald-400" />}
                title="尺寸與空間換算"
                description="快速計算 LED 解析度、投影距離、輸出出血邊，以及各桌型的空間容留人數。"
                href="calculator.html"
              />
              <FeatureCard 
                icon={<Icon name="box" className="w-6 h-6 text-indigo-600 dark:text-indigo-400" />}
                title="Truss 結構圖"
                description="生成打卡牆或舞台 Truss 結構圖，匯出白底黑線尺寸藍圖供發包使用。"
                href="truss.html"
              />
              <FeatureCard 
                icon={<Icon name="map" className="w-6 h-6 text-blue-600 dark:text-blue-400" />}
                title="動線與平面圖"
                description="自由拖曳舞台、控台與不規則帳篷，繪製專業配置圖與圖層管理。"
                href="floorplan.html"
              />
              <FeatureCard 
                icon={<Icon name="fileText" className="w-6 h-6 text-rose-600 dark:text-rose-400" />}
                title="場勘數據報告"
                description="告別繁雜紙本。標準化輸入場地數據，一鍵生成 A4 專業報告與 PDF。"
                href="report.html"
              />
            </div>
          </div>
        </div>
      );
    }

    function FeatureCard({ icon, title, description, href }) {
      return (
        <a href={href} className="bg-white dark:bg-[#202024] rounded-xl border border-slate-200 dark:border-slate-800 hover:border-indigo-300 dark:hover:border-indigo-600 hover:shadow-lg transition-all duration-300 cursor-pointer group flex flex-col h-full overflow-hidden block">
          <div className="p-5 flex-1 flex flex-col">
            <div className="w-10 h-10 rounded-lg bg-slate-50 dark:bg-[#2A2B30] flex items-center justify-center mb-4 border border-slate-100 dark:border-slate-700">
              {icon}
            </div>
            <h3 className="text-base font-bold mb-2 text-slate-900 dark:text-white">{title}</h3>
            <p className="text-slate-500 dark:text-slate-400 text-xs flex-1 leading-relaxed">{description}</p>
          </div>
          <div className="px-5 py-3 border-t border-slate-100 dark:border-slate-800/80 flex items-center justify-between group-hover:bg-slate-50 dark:group-hover:bg-[#25252A] transition-colors">
            <span className="text-[11px] font-bold text-indigo-600 dark:text-indigo-400">開啟工具</span>
            <Icon name="arrowRight" className="w-3.5 h-3.5 text-indigo-600 dark:text-indigo-400 group-hover:translate-x-1 transition-transform" />
          </div>
        </a>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    function RootApp() {
      const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'light');
      useEffect(() => {
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', theme);
      }, [theme]);
      const toggleTheme = () => setTheme(prev => prev === 'light' ? 'dark' : 'light');
      
      return (
        <AppLayout activePage="home" theme={theme} toggleTheme={toggleTheme}>
          <HomeApp />
        </AppLayout>
      );
    }
    root.render(<RootApp />);
  </script>
</body>
</html>
